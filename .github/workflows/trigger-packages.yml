name: Trigger packages build

on:
  push:
    branches:
      - main

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger aiv-code/packages workflows
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PACKAGES_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/aiv-code/packages/dispatches \
            -d '{"event_type":"docker-aiv-release"}'
